<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pizzaria 🍕</title>
</head>

<body>

<h1>🍕 Sistema de Pizzaria</h1>

<h2>Ingredientes</h2>
<input id="ing_nome" placeholder="Nome">
<input id="ing_qtd" type="number" placeholder="Qtd">
<button onclick="addIngrediente()">Adicionar</button>
<ul id="listaIngredientes"></ul>

<h2>Pizzas</h2>
<input id="pizza_nome" placeholder="Nome">
<input id="pizza_ing" placeholder="Ingredientes (ex: queijo,molho)">
<button onclick="addPizza()">Cadastrar</button>
<ul id="listaPizzas"></ul>

<h2>Pedidos</h2>
<select id="pedido_nome"></select>
<button onclick="fazerPedido()">Fazer pedido</button>

<p id="msg"></p>

<script>

const API = "http://localhost:8001";

// INGREDIENTES
async function addIngrediente() {
    await fetch(API + "/ingredientes", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            nome: ing_nome.value,
            quantidade: parseInt(ing_qtd.value)
        })
    });
    listarIngredientes();
}

async function listarIngredientes() {
    const res = await fetch(API + "/ingredientes");
    const data = await res.json();

    listaIngredientes.innerHTML = "";
    data.forEach(p => {
        const li = document.createElement("li");
        li.innerHTML = `
            ${p.nome} - ${p.quantidade}
            <input type="number" id="qtd-${p.id}" placeholder="Nova qtd">
            <button onclick="editar(${p.id})">Atualizar</button>
        `;
        listaIngredientes.appendChild(li);
    });
}

async function editar(id) {
    const qtd = document.getElementById(`qtd-${id}`).value;

    await fetch(API + `/ingredientes/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ quantidade: qtd })
    });

    listarIngredientes();
}

// PIZZAS
async function addPizza() {
    await fetch(API + "/pizzas", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            nome: pizza_nome.value,
            ingredientes: pizza_ing.value
        })
    });
    listarPizzas();
    carregarDropdownPizzas();
}

async function listarPizzas() {
    const res = await fetch(API + "/pizzas");
    const data = await res.json();

    listaPizzas.innerHTML = "";
    data.forEach(p => {
        listaPizzas.innerHTML += `<li>${p.nome} (${p.ingredientes})</li>`;
    });
}

// PEDIDO
async function carregarDropdownPizzas() {
    const res = await fetch(API + "/pizzas");
    const data = await res.json();

    pedido_nome.innerHTML = ""; // limpa

    data.forEach(p => {
        const option = document.createElement("option");
        option.value = p.nome;
        option.text = p.nome;
        pedido_nome.appendChild(option);
    });
}

async function fazerPedido() {
    const res = await fetch(API + "/pedidos", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            pizza: pedido_nome.value
        })
    });

    const data = await res.json();

    // 🔥 trata sucesso ou erro
    if (!res.ok) {
        msg.innerText = data.erro;
        msg.style.color = "red";
        return;
    }

    msg.innerText = data.msg;
    msg.style.color = "green";

    listarIngredientes();
}

carregarDropdownPizzas();
listarIngredientes();
listarPizzas();

</script>

</body>
</html>
